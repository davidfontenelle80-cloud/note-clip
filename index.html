<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Note Clip — Personal notes, lists, and reminders. Offline-first PWA.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Note Clip">
  <meta name="theme-color" content="#F5F2ED" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1A1814" media="(prefers-color-scheme: dark)">
  <title>Note Clip</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <!-- Styles -->
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

  <!-- Update notice -->
  <div id="update-notice" class="update-notice" hidden>
    <span>A new version is available.</span>
    <button id="update-btn" style="font-weight:700;text-decoration:underline;background:none;color:inherit;border:none;cursor:pointer">
      Refresh
    </button>
  </div>

  <!-- App Header -->
  <header class="app-header">
    <div class="app-title">
      <span class="app-title-icon">📌</span>
      Note Clip
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="es">ES</button>
    </div>
  </header>

  <!-- Main content -->
  <main class="app-main" id="app-main">

    <!-- Dashboard Pane -->
    <section id="pane-dashboard" class="tab-pane active">
      <!-- Rendered by dashboard.js -->
    </section>

    <!-- Notes Pane -->
    <section id="pane-notes" class="tab-pane">
      <!-- Rendered by notes.js -->
    </section>

    <!-- Lists Pane -->
    <section id="pane-lists" class="tab-pane">
      <!-- Rendered by lists.js -->
    </section>

    <!-- Shared Pane -->
    <section id="pane-shared" class="tab-pane">
      <!-- Rendered by shared.js -->
    </section>

    <!-- Communication Pane -->
    <section id="pane-communication" class="tab-pane">
      <!-- Rendered by communication.js -->
    </section>

    <!-- Settings Pane -->
    <section id="pane-settings" class="tab-pane">
      <!-- Rendered by settings.js -->
    </section>

  </main>

  <!-- FAB -->
  <button class="fab" id="fab" aria-label="Add new">
    +
  </button>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
    <button class="nav-tab active" data-tab="dashboard" aria-label="Dashboard">
      <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="h1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8C97A"/><stop offset="100%" stop-color="#C8A055"/></linearGradient>
    <linearGradient id="h2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F5D98A"/><stop offset="100%" stop-color="#D4A960"/></linearGradient>
  </defs>
  <path d="M3 10.5L12 3l9 7.5V21a1 1 0 01-1 1H15v-5h-6v5H4a1 1 0 01-1-1V10.5z" fill="url(#h1)" stroke="#B8924F" stroke-width="1.2"/>
  <path d="M3 10.5L12 3l9 7.5" fill="none" stroke="#9A7830" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M3.5 11L12 4l8.5 7" fill="url(#h2)" opacity="0.4"/>
</svg></span>
      <span data-i18n="tab_dashboard">Dashboard</span>
    </button>
    <button class="nav-tab" data-tab="notes" aria-label="Notes">
      <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="n1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F7F0B6"/><stop offset="100%" stop-color="#E8D878"/></linearGradient>
  </defs>
  <rect x="4" y="2" width="13" height="17" rx="2" fill="url(#n1)" stroke="#C8A96E" stroke-width="1.2"/>
  <rect x="5" y="3" width="13" height="17" rx="2" fill="#FDFAEE" stroke="#D4B97E" stroke-width="1" opacity="0.7"/>
  <line x1="8" y1="8" x2="15" y2="8" stroke="#B8924F" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="11" x2="15" y2="11" stroke="#C8A96E" stroke-width="1" stroke-linecap="round"/>
  <line x1="8" y1="14" x2="13" y2="14" stroke="#C8A96E" stroke-width="1" stroke-linecap="round"/>
  <path d="M16 15l3 3-1.5 1.5L14.5 16.5 16 15z" fill="#C8A96E" stroke="#9A7830" stroke-width="0.8"/>
</svg></span>
      <span data-i18n="tab_notes">Notes</span>
    </button>
    <button class="nav-tab" data-tab="lists" aria-label="Lists">
      <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="l1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C5E2C5"/><stop offset="100%" stop-color="#A0C8A0"/></linearGradient>
  </defs>
  <rect x="3" y="3" width="18" height="18" rx="3" fill="url(#l1)" stroke="#80A880" stroke-width="1.2"/>
  <rect x="3.5" y="3.5" width="17" height="4" rx="2.5" fill="rgba(255,255,255,.35)"/>
  <rect x="6" y="9" width="4" height="4" rx="1" fill="#4E9A6A" stroke="#3A7A50" stroke-width="0.8"/>
  <path d="M7 11l1 1 2-2" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="12" y1="11" x2="18" y2="11" stroke="#3A7A50" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="6" y="15" width="4" height="4" rx="1" fill="none" stroke="#4E9A6A" stroke-width="1"/>
  <line x1="12" y1="17" x2="17" y2="17" stroke="#80A880" stroke-width="1.2" stroke-linecap="round"/>
</svg></span>
      <span data-i18n="tab_lists">Lists</span>
    </button>
    <button class="nav-tab" data-tab="shared" aria-label="Shared">
      <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="s1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#BDD5EA"/><stop offset="100%" stop-color="#88B4D8"/></linearGradient>
  </defs>
  <circle cx="18" cy="5"  r="3" fill="url(#s1)" stroke="#4A78C8" stroke-width="1"/>
  <circle cx="6"  cy="12" r="3" fill="url(#s1)" stroke="#4A78C8" stroke-width="1"/>
  <circle cx="18" cy="19" r="3" fill="url(#s1)" stroke="#4A78C8" stroke-width="1"/>
  <line x1="8.7"  y1="10.7" x2="15.3" y2="6.3"  stroke="#4A78C8" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="8.7"  y1="13.3" x2="15.3" y2="17.7" stroke="#4A78C8" stroke-width="1.4" stroke-linecap="round"/>
</svg></span>
      <span data-i18n="tab_shared">Shared</span>
    </button>
    <button class="nav-tab" data-tab="communication" aria-label="Communication">
      <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="c1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#D4C5E2"/><stop offset="100%" stop-color="#B8A0D0"/></linearGradient>
  </defs>
  <path d="M3 4h18a1 1 0 011 1v11a1 1 0 01-1 1H7l-4 3V5a1 1 0 011-1z" fill="url(#c1)" stroke="#9070B8" stroke-width="1.2"/>
  <path d="M3.5 4.5h17v10.5H7.5L3.5 18V4.5z" fill="rgba(255,255,255,.25)"/>
  <line x1="7" y1="9"  x2="17" y2="9"  stroke="#7050A0" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="7" y1="12" x2="14" y2="12" stroke="#9070B8" stroke-width="1.2" stroke-linecap="round"/>
</svg></span>
      <span data-i18n="tab_communication">Comms</span>
    </button>
    <button class="nav-tab" data-tab="settings" aria-label="Settings">
      <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#EFEBE3"/><stop offset="100%" stop-color="#C8B898"/></linearGradient>
  </defs>
  <path d="M12 8a4 4 0 100 8 4 4 0 000-8z" fill="url(#g1)" stroke="#9A7830" stroke-width="1.2"/>
  <path fill-rule="evenodd" clip-rule="evenodd" d="M10.5 2.5h3l.5 2.2a7 7 0 011.7 1l2.1-.9 2.1 2.1-.9 2.1a7 7 0 011 1.7l2.2.5v3l-2.2.5a7 7 0 01-1 1.7l.9 2.1-2.1 2.1-2.1-.9a7 7 0 01-1.7 1L13.5 21.5h-3l-.5-2.2a7 7 0 01-1.7-1l-2.1.9-2.1-2.1.9-2.1a7 7 0 01-1-1.7L1.5 12.5v-3l2.2-.5a7 7 0 011-1.7l-.9-2.1 2.1-2.1 2.1.9a7 7 0 011.7-1L10.5 2.5z" fill="url(#g1)" stroke="#B8924F" stroke-width="1.1" stroke-linejoin="round"/>
  <circle cx="12" cy="12" r="3" fill="white" opacity="0.6"/>
</svg></span>
      <span data-i18n="tab_settings">Settings</span>
    </button>
  </nav>

  <!-- Toast -->
  <div id="app-toast" class="toast"></div>

  <!-- Scripts — load order matters -->
  <script src="./js/i18n.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/dashboard.js"></script>
  <script src="./js/notes.js"></script>
  <script src="./js/lists.js"></script>
  <script src="./js/shared.js"></script>
  <script src="./js/communication.js"></script>
  <script src="./js/settings.js"></script>
  <script src="./js/firebase/firebase-config.js"></script>
  <script src="./app.js"></script>

</body>
</html>
