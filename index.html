<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Note Clip — Personal notes, lists, and reminders. Offline-first PWA.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Note Clip">
  <meta name="theme-color" content="#F5F2ED" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1A1814" media="(prefers-color-scheme: dark)">
  <title>Note Clip</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <!-- Styles -->
  <link rel="stylesheet" href="./css/styles.css">
  <style>
    :root{--quick-paper:#ffed9f;--quick-paper-deep:#efd16c;--quick-paper-edge:rgba(126,92,25,.2);--quick-paper-line:rgba(122,92,22,.18);--quick-paper-grain:rgba(109,78,24,.12);--quick-paper-text:#352713;--quick-paper-muted:rgba(53,39,19,.5);--quick-paper-shadow:rgba(108,80,31,.22)}
    [data-theme="dark"]{--quick-paper:#d0b84f;--quick-paper-deep:#a98f34;--quick-paper-edge:rgba(255,234,143,.25);--quick-paper-line:rgba(255,245,178,.24);--quick-paper-grain:rgba(255,242,171,.16);--quick-paper-text:#17150b;--quick-paper-muted:rgba(23,21,11,.56);--quick-paper-shadow:rgba(0,0,0,.58)}
    .bottom-nav{justify-content:center;gap:clamp(2px,1vw,8px);padding:6px 8px calc(6px + env(safe-area-inset-bottom,0px))}
    .nav-tab{flex:1 1 0;max-width:72px;min-width:0;min-height:58px;padding:6px 4px;gap:4px;justify-content:center;line-height:1.1;text-align:center}
    .nav-tab>span[data-i18n]{display:block;width:100%;max-width:58px;overflow:hidden;text-align:center;text-overflow:ellipsis;white-space:nowrap}
    .nav-tab .nav-icon{line-height:1}
    .nav-stationery{--icon-paper:#fde78d;--icon-paper-2:#f8d66a;--icon-paper-line:rgba(110,76,22,.2);--icon-accent:#9fc3da;--icon-accent-2:#d8b2c5;--icon-ink:#5a4a2a;display:block;width:32px;height:28px;position:relative;font-size:0;filter:saturate(.86) drop-shadow(0 4px 4px rgba(64,45,16,.16));opacity:.78;transform:rotate(-5deg) skewY(-2deg);transition:opacity var(--transition),filter var(--transition),transform var(--transition-spring)}
    .nav-stationery:before{content:'';position:absolute;left:11px;top:0;z-index:3;width:10px;height:14px;border:2px solid rgba(117,126,134,.58);border-top-color:rgba(255,255,255,.76);border-radius:5px 5px 7px 7px;background:linear-gradient(180deg,rgba(255,255,255,.58),rgba(160,168,174,.18));box-shadow:0 2px 4px rgba(68,54,28,.14),inset 0 1px 0 rgba(255,255,255,.7)}
    .nav-tab.active .nav-stationery{opacity:1;filter:saturate(1.05) drop-shadow(0 5px 5px rgba(96,64,18,.24));transform:translateY(-1px) rotate(-5deg) skewY(-2deg)}
    [data-theme="dark"] .nav-stationery{--icon-paper:#a88f34;--icon-paper-2:#806d27;--icon-paper-line:rgba(255,236,149,.18);--icon-accent:#5f879f;--icon-accent-2:#8b6077;--icon-ink:#16170e;filter:saturate(.95) drop-shadow(0 5px 5px rgba(0,0,0,.34))}
    .nav-glyph,.nav-glyph:before,.nav-glyph:after{content:'';position:absolute;box-sizing:border-box}
    .nav-glyph{inset:3px 5px 4px 6px;border:1px solid rgba(91,65,18,.16);border-radius:7px 7px 8px 8px;background:repeating-linear-gradient(to bottom,transparent 0 7px,var(--icon-paper-line) 7px 8px,transparent 8px 11px),linear-gradient(145deg,#fff3b7 0%,var(--icon-paper) 54%,var(--icon-paper-2) 100%);box-shadow:inset 1px 1px 0 rgba(255,255,255,.58),inset -1px -1px 0 rgba(126,88,20,.1),0 5px 7px rgba(96,68,20,.16)}
    [data-theme="dark"] .nav-glyph{border-color:rgba(245,222,125,.13);box-shadow:inset 1px 1px 0 rgba(255,240,162,.12),inset -1px -1px 0 rgba(0,0,0,.18),0 5px 8px rgba(0,0,0,.34)}
    .nav-notes .nav-glyph:before,.nav-dashboard .nav-glyph:before{top:-1px;right:-1px;width:8px;height:8px;border-radius:0 6px 0 4px;background:linear-gradient(135deg,rgba(255,255,255,.7),var(--icon-paper-2));border-left:1px solid rgba(106,75,22,.14);border-bottom:1px solid rgba(106,75,22,.12)}
    .nav-dashboard .nav-glyph{inset:4px 4px 4px 5px;background:linear-gradient(145deg,#fff0a9 0%,var(--icon-paper) 100%)}
    .nav-dashboard .nav-glyph:after{left:4px;top:5px;width:6px;height:6px;border-radius:2px;background:var(--icon-accent);box-shadow:9px 0 0 var(--icon-accent-2),0 9px 0 #c6d9a3,9px 9px 0 var(--icon-paper-2)}
    .nav-notes .nav-glyph:after{left:4px;right:5px;top:8px;height:1px;background:var(--icon-paper-line);box-shadow:0 5px 0 var(--icon-paper-line),0 10px 0 var(--icon-paper-line)}
    .nav-lists .nav-glyph{inset:3px 5px 4px 7px;border-radius:6px;background:linear-gradient(90deg,var(--icon-accent) 0 4px,transparent 4px),repeating-linear-gradient(to bottom,transparent 0 7px,var(--icon-paper-line) 7px 8px,transparent 8px 11px),linear-gradient(145deg,#fff3b8,var(--icon-paper) 68%,var(--icon-paper-2))}
    .nav-lists .nav-glyph:before{left:7px;top:6px;width:3px;height:3px;border-radius:50%;background:var(--icon-ink);box-shadow:0 6px 0 var(--icon-ink),0 12px 0 var(--icon-ink)}
    .nav-lists .nav-glyph:after{left:12px;top:7px;width:8px;height:1px;background:var(--icon-paper-line);box-shadow:0 6px 0 var(--icon-paper-line),0 12px 0 var(--icon-paper-line)}
    .nav-shared .nav-glyph{inset:6px 3px 3px 9px;transform:rotate(5deg)}
    .nav-shared .nav-glyph:before{left:-6px;top:-4px;width:20px;height:16px;border-radius:6px;border:1px solid rgba(91,65,18,.14);background:linear-gradient(145deg,#fff4b8,var(--icon-paper));box-shadow:0 4px 6px rgba(96,68,20,.12)}
    .nav-shared .nav-glyph:after{left:-2px;top:-2px;width:15px;height:10px;border:2px solid var(--icon-accent);border-left-color:transparent;border-radius:8px;transform:rotate(-30deg)}
    .nav-comms .nav-glyph{inset:6px 5px 4px 5px;border-radius:6px;background:linear-gradient(145deg,#fff1aa,var(--icon-paper))}
    .nav-comms .nav-glyph:before{left:2px;right:2px;top:3px;height:10px;border-left:10px solid transparent;border-right:10px solid transparent;border-top:7px solid rgba(121,88,27,.18)}
    .nav-comms .nav-glyph:after{right:-4px;top:-6px;width:12px;height:9px;border-radius:5px 5px 5px 1px;background:var(--icon-accent-2);box-shadow:inset 1px 1px 0 rgba(255,255,255,.32)}
    .nav-settings .nav-glyph{inset:4px 7px 3px 6px;border-radius:6px;background:linear-gradient(90deg,var(--icon-accent-2) 0 4px,transparent 4px),linear-gradient(145deg,#fff3b4,var(--icon-paper) 65%,var(--icon-paper-2))}
    .nav-settings .nav-glyph:before{right:3px;top:5px;width:10px;height:2px;border-radius:3px;background:var(--icon-ink);opacity:.48;box-shadow:-3px 5px 0 var(--icon-ink),0 10px 0 var(--icon-ink)}
    .nav-settings .nav-glyph:after{left:10px;bottom:-3px;width:5px;height:18px;border-radius:4px;background:linear-gradient(to bottom,var(--icon-accent),#e1c06d 70%,var(--icon-ink) 70% 100%);transform:rotate(38deg);box-shadow:0 3px 4px rgba(78,54,14,.18)}
    .stage5b-greeting-icon{width:24px;height:24px;object-fit:contain;display:inline-block;vertical-align:-5px;margin-right:8px;filter:drop-shadow(0 2px 4px rgba(160,130,80,.18))}
    [data-theme="dark"] .stage5b-greeting-icon{filter:drop-shadow(0 3px 8px rgba(0,0,0,.45))}
    .quick-note-wrap{position:relative;isolation:isolate;overflow:visible;border:1.5px solid var(--quick-paper-edge);border-radius:22px 24px 24px 22px;background:radial-gradient(circle at 18% 21%,var(--quick-paper-grain) 0 1px,transparent 1.6px),radial-gradient(circle at 73% 38%,var(--quick-paper-grain) 0 1px,transparent 1.7px),radial-gradient(circle at 43% 74%,var(--quick-paper-grain) 0 1px,transparent 1.5px),linear-gradient(145deg,#fff7bd 0%,var(--quick-paper) 58%,var(--quick-paper-deep) 100%);background-size:25px 25px,31px 31px,37px 37px,auto;box-shadow:0 3px 4px var(--quick-paper-shadow),0 12px 24px rgba(108,80,31,.18),0 24px 38px rgba(108,80,31,.11),0 9px 0 -5px color-mix(in srgb,var(--quick-paper-deep) 72%,#8f7424),inset 1px 1px 0 rgba(255,255,255,.55),inset -1px -1px 0 rgba(119,84,21,.08);transform:rotate(-.7deg);transition:box-shadow var(--transition),transform var(--transition-spring),border-color var(--transition)}
    .quick-note-wrap:focus-within{border-color:color-mix(in srgb,var(--color-primary) 70%,var(--quick-paper-edge));box-shadow:0 0 0 3px color-mix(in srgb,var(--color-primary) 18%,transparent),0 3px 4px var(--quick-paper-shadow),0 12px 26px rgba(108,80,31,.18),inset 1px 1px 0 rgba(255,255,255,.48);transform:rotate(-.7deg) translateY(-1px)}
    .quick-note-wrap:before{content:'';position:absolute;inset:0;z-index:0;pointer-events:none;background:linear-gradient(90deg,rgba(255,255,255,.2),transparent 30% 70%,rgba(112,78,19,.07)),radial-gradient(ellipse at 50% 0,rgba(255,255,255,.28),transparent 48%);mix-blend-mode:soft-light}
    .quick-note-wrap:after{content:'';position:absolute;right:-1px;bottom:-1px;z-index:2;width:54px;height:54px;border-radius:18px 0 22px 0;background:linear-gradient(135deg,rgba(255,255,255,.72) 0%,rgba(255,238,158,.92) 45%,var(--quick-paper-deep) 100%);clip-path:polygon(100% 0,100% 100%,0 100%);border-left:1px solid rgba(120,86,21,.16);border-top:1px solid rgba(120,86,21,.14);box-shadow:-7px -5px 12px rgba(103,75,22,.12);pointer-events:none}
    .quick-note-clip{position:absolute;left:50%;top:-18px;z-index:4;width:48px;height:54px;transform:translateX(-50%);border:3px solid rgba(120,129,138,.42);border-top-color:rgba(255,255,255,.72);border-radius:15px 15px 24px 24px;background:linear-gradient(180deg,rgba(255,255,255,.56),rgba(209,216,220,.24) 42%,rgba(255,255,255,.1));box-shadow:0 8px 13px rgba(65,55,32,.18),inset 0 2px 0 rgba(255,255,255,.66),inset 0 -2px 5px rgba(80,86,92,.12);pointer-events:none}
    .quick-note-clip:before{content:'';position:absolute;left:7px;right:7px;bottom:8px;height:27px;border:2px solid rgba(92,101,109,.34);border-top:0;border-radius:0 0 18px 18px}
    .quick-note-input{position:relative;z-index:1;padding:26px 42px 14px 18px;background:repeating-linear-gradient(to bottom,transparent 0 25px,var(--quick-paper-line) 25px 26px,transparent 26px 32px);color:var(--quick-paper-text);font-weight:500;line-height:32px;min-height:124px;caret-color:var(--quick-paper-text)}
    .quick-note-input::placeholder{color:var(--quick-paper-muted)}
    .quick-note-actions{position:relative;z-index:3;padding:10px var(--space-md) 12px;border-top:1px solid var(--quick-paper-line);background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(116,82,20,.08)),color-mix(in srgb,var(--quick-paper) 68%,var(--quick-paper-deep))}
    [data-theme="dark"] .quick-note-wrap{background:radial-gradient(circle at 18% 21%,var(--quick-paper-grain) 0 1px,transparent 1.6px),radial-gradient(circle at 73% 38%,var(--quick-paper-grain) 0 1px,transparent 1.7px),radial-gradient(circle at 43% 74%,var(--quick-paper-grain) 0 1px,transparent 1.5px),linear-gradient(145deg,#e2c95f 0%,var(--quick-paper) 58%,var(--quick-paper-deep) 100%);box-shadow:0 3px 4px var(--quick-paper-shadow),0 16px 28px rgba(0,0,0,.48),0 30px 48px rgba(0,0,0,.36),0 9px 0 -5px #776527,inset 1px 1px 0 rgba(255,245,177,.18),inset -1px -1px 0 rgba(0,0,0,.16)}
    [data-theme="dark"] .quick-note-clip{border-color:rgba(190,199,207,.34);border-top-color:rgba(255,255,255,.58);background:linear-gradient(180deg,rgba(255,255,255,.38),rgba(169,178,186,.18) 45%,rgba(255,255,255,.08));box-shadow:0 10px 18px rgba(0,0,0,.34),inset 0 2px 0 rgba(255,255,255,.42),inset 0 -2px 5px rgba(0,0,0,.2)}
    [data-theme="dark"] .quick-note-actions{background:linear-gradient(180deg,rgba(255,241,156,.08),rgba(0,0,0,.1)),color-mix(in srgb,var(--quick-paper) 58%,var(--quick-paper-deep))}
    .category-card{overflow:hidden;background:radial-gradient(circle at 18px 18px,rgba(255,255,255,.3) 0 1px,transparent 1.5px),linear-gradient(145deg,#fffdf8,#f4efe6);background-size:14px 14px,auto;border-color:rgba(160,130,80,.14);box-shadow:0 6px 16px rgba(121,91,48,.1),0 1px 2px rgba(0,0,0,.05),inset 0 1px 0 rgba(255,255,255,.7)}
    .category-card:before{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(120,90,45,.025));mix-blend-mode:multiply}
    .category-card-top,.category-name,.category-count{position:relative;z-index:1}.category-icon-wrap{width:48px;height:48px;padding:8px;border-radius:16px;background:linear-gradient(145deg,rgba(255,255,255,.72),rgba(239,229,211,.72));border:1px solid rgba(160,130,80,.14);box-shadow:inset 0 1px 0 rgba(255,255,255,.72),0 5px 12px rgba(121,91,48,.1)}
    .category-icon-wrap img,.cat-icon-img{width:30px!important;height:30px!important;object-fit:contain;filter:drop-shadow(0 3px 4px rgba(90,65,35,.16));transform:translateZ(0)}.chip-icon-img{width:16px;height:16px;object-fit:contain;vertical-align:-3px;filter:drop-shadow(0 1px 2px rgba(90,65,35,.12))}
    .stage5b-icon-fallback{width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border-radius:10px;background:rgba(200,169,110,.16);color:var(--color-primary-dark);font-weight:800;font-size:.8rem;letter-spacing:.02em}
    [data-theme="dark"] .category-card{background:radial-gradient(circle at 18px 18px,rgba(255,255,255,.05) 0 1px,transparent 1.5px),linear-gradient(145deg,#151e30,#101827);border-color:rgba(212,175,90,.16);box-shadow:0 12px 28px rgba(0,0,0,.34),0 1px 2px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.06)}
    [data-theme="dark"] .category-icon-wrap{background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(212,175,90,.08));border-color:rgba(212,175,90,.18);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 6px 16px rgba(0,0,0,.32)}[data-theme="dark"] .category-icon-wrap img,[data-theme="dark"] .cat-icon-img{filter:drop-shadow(0 4px 8px rgba(0,0,0,.42))}
  </style>
</head>
<body>

  <!-- Update notice -->
  <div id="update-notice" class="update-notice" hidden>
    <span data-i18n="update_available">A new version is available.</span>
    <button id="update-btn" data-i18n="update_refresh" style="font-weight:700;text-decoration:underline;background:none;color:inherit;border:none;cursor:pointer">
      Refresh
    </button>
  </div>

  <!-- App Header -->
  <header class="app-header">
    <div class="app-title">
      <span class="app-title-icon">📌</span>
      Note Clip
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="es">ES</button>
    </div>
  </header>

  <!-- Main content -->
  <main class="app-main" id="app-main">

    <!-- Dashboard Pane -->
    <section id="pane-dashboard" class="tab-pane active">
      <!-- Rendered by dashboard.js -->
    </section>

    <!-- Notes Pane -->
    <section id="pane-notes" class="tab-pane">
      <!-- Rendered by notes.js -->
    </section>

    <!-- Lists Pane -->
    <section id="pane-lists" class="tab-pane">
      <!-- Rendered by lists.js -->
    </section>

    <!-- Shared Pane -->
    <section id="pane-shared" class="tab-pane">
      <!-- Rendered by shared.js -->
    </section>

    <!-- Communication Pane -->
    <section id="pane-communication" class="tab-pane">
      <!-- Rendered by communication.js -->
    </section>

    <!-- Settings Pane -->
    <section id="pane-settings" class="tab-pane">
      <!-- Rendered by settings.js -->
    </section>

  </main>

  <!-- FAB -->
  <button class="fab" id="fab" aria-label="Add new">
    +
  </button>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
    <button class="nav-tab active" data-tab="dashboard" aria-label="Dashboard">
      <span class="nav-icon nav-stationery nav-dashboard" aria-hidden="true"><span class="nav-glyph"></span></span>
      <span data-i18n="tab_dashboard">Dashboard</span>
    </button>
    <button class="nav-tab" data-tab="notes" aria-label="Notes">
      <span class="nav-icon nav-stationery nav-notes" aria-hidden="true"><span class="nav-glyph"></span></span>
      <span data-i18n="tab_notes">Notes</span>
    </button>
    <button class="nav-tab" data-tab="lists" aria-label="Lists">
      <span class="nav-icon nav-stationery nav-lists" aria-hidden="true"><span class="nav-glyph"></span></span>
      <span data-i18n="tab_lists">Lists</span>
    </button>
    <button class="nav-tab" data-tab="shared" aria-label="Shared">
      <span class="nav-icon nav-stationery nav-shared" aria-hidden="true"><span class="nav-glyph"></span></span>
      <span data-i18n="tab_shared">Shared</span>
    </button>
    <button class="nav-tab" data-tab="communication" aria-label="Communication">
      <span class="nav-icon nav-stationery nav-comms" aria-hidden="true"><span class="nav-glyph"></span></span>
      <span data-i18n="tab_communication">Comms</span>
    </button>
    <button class="nav-tab" data-tab="settings" aria-label="Settings">
      <span class="nav-icon nav-stationery nav-settings" aria-hidden="true"><span class="nav-glyph"></span></span>
      <span data-i18n="tab_settings">Settings</span>
    </button>
  </nav>

  <!-- Toast -->
  <div id="app-toast" class="toast"></div>

  <!-- Scripts — load order matters -->
  <script src="./js/i18n.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/dashboard.js"></script>
  <script src="./js/notes.js"></script>
  <script src="./js/lists.js"></script>
  <script src="./js/shared.js"></script>
  <script src="./js/communication.js"></script>
  <script src="./js/settings.js"></script>
  <script src="./js/firebase/firebase-config.js"></script>
  <script src="./app.js"></script>
  <script>
    (function(){
      const icons=[
        {id:'morning',start:5,end:12,file:'ic_cat_ideas',fallback:'AM'},
        {id:'afternoon',start:12,end:17,file:'ic_cat_work',fallback:'PM'},
        {id:'evening',start:17,end:21,file:'ic_cat_home',fallback:'EV'},
        {id:'night',start:21,end:29,file:'ic_extra_stars',fallback:'NT'}
      ];
      function config(){const h=new Date().getHours();const n=h<5?h+24:h;return icons.find(i=>n>=i.start&&n<i.end)||icons[3];}
      function applyGreeting(){
        const g=document.querySelector('#pane-dashboard .greeting-text');
        if(!g||g.dataset.stage5b==='1')return;
        const img=g.querySelector('img');
        if(!img)return;
        const c=config();
        img.src='./icons/'+c.file+'.png';
        img.alt=c.id+' greeting';
        img.classList.add('stage5b-greeting-icon');
        img.onerror=function(){const s=document.createElement('span');s.className='stage5b-greeting-icon stage5b-icon-fallback';s.textContent=c.fallback;this.replaceWith(s);};
        g.dataset.stage5b='1';
      }
      const catIcons={work:'ic_cat_work',medical:'ic_cat_medical',personal:'ic_cat_personal',home:'ic_cat_home',documents:'ic_cat_documents','follow-up':'ic_cat_followup',orders:'ic_cat_orders',ideas:'ic_cat_ideas'};
      function applyCategoryIcons(){
        document.querySelectorAll('#pane-notes .category-card').forEach(card=>{
          if(card.dataset.stage5bCat==='1')return;
          const name=(card.querySelector('.category-name')?.textContent||'').trim().toLowerCase();
          const file=catIcons[name];
          const wrap=card.querySelector('.category-icon-wrap');
          if(!file||!wrap)return;
          const fallback=(name.slice(0,2)||'NC').toUpperCase();
          wrap.innerHTML='<img src="./icons/'+file+'.png" class="cat-icon-img" alt="">';
          const img=wrap.querySelector('img');
          img.onerror=function(){wrap.innerHTML='<span class="stage5b-icon-fallback">'+fallback+'</span>';};
          card.dataset.stage5bCat='1';
        });
      }
      function apply(){applyGreeting();applyCategoryIcons();}
      window.addEventListener('DOMContentLoaded',function(){apply();new MutationObserver(apply).observe(document.getElementById('app-main'),{childList:true,subtree:true});});
    })();
  </script>

</body>
</html>
