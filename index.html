<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Note Clip — Personal notes, lists, and reminders. Offline-first PWA.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Note Clip">
  <meta name="theme-color" content="#F5F2ED" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1A1814" media="(prefers-color-scheme: dark)">
  <title>Note Clip</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <!-- Styles -->
  <link rel="stylesheet" href="./css/styles.css">
  <style>
    .bottom-nav{justify-content:center;gap:clamp(2px,1vw,8px);padding:6px 8px calc(6px + env(safe-area-inset-bottom,0px))}
    .nav-tab{flex:1 1 0;max-width:72px;min-width:0;min-height:58px;padding:6px 4px;gap:4px;justify-content:center;line-height:1.1;text-align:center}
    .nav-tab .nav-icon{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;line-height:0;flex:0 0 28px;filter:drop-shadow(0 1px 0 rgba(255,255,255,.45))}
    .nav-icon-img{width:24px;height:24px;object-fit:contain;image-rendering:auto;transform:translateZ(0);backface-visibility:hidden}
    .nav-tab.active .nav-icon{background:color-mix(in srgb,var(--color-primary) 14%,transparent);border-radius:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.55),0 3px 10px rgba(160,130,80,.12)}
    [data-theme="dark"] .nav-tab .nav-icon{filter:drop-shadow(0 2px 5px rgba(0,0,0,.35))}
    [data-theme="dark"] .nav-tab.active .nav-icon{background:rgba(212,175,90,.16);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 4px 14px rgba(0,0,0,.35)}
    .stage5b-greeting-icon{width:24px;height:24px;object-fit:contain;display:inline-block;vertical-align:-5px;margin-right:8px;filter:drop-shadow(0 2px 4px rgba(160,130,80,.18))}
    [data-theme="dark"] .stage5b-greeting-icon{filter:drop-shadow(0 3px 8px rgba(0,0,0,.45))}
    .quick-note-wrap{position:relative;overflow:hidden;border:1px solid rgba(160,130,80,.2);border-radius:18px 22px 20px 18px;background:radial-gradient(circle at 18px 18px,rgba(255,255,255,.32) 0 1px,transparent 1.5px),linear-gradient(135deg,#fff3a8,#f7d9b0);background-size:14px 14px,auto;box-shadow:0 8px 18px rgba(121,91,48,.13),0 2px 4px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.62);transform:rotate(-.35deg)}
    .quick-note-wrap:before{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,rgba(255,255,255,.1) 0 1px,transparent 1px),linear-gradient(0deg,rgba(130,100,55,.035) 0 1px,transparent 1px);background-size:11px 11px,100% 24px;mix-blend-mode:multiply}
    .quick-note-wrap:after{content:'';position:absolute;right:0;top:0;width:34px;height:34px;background:linear-gradient(135deg,rgba(255,255,255,.75) 0 49%,rgba(190,145,75,.22) 50% 100%);clip-path:polygon(100% 0,100% 100%,0 0);box-shadow:-2px 2px 5px rgba(120,85,40,.12);pointer-events:none}
    .quick-note-input{position:relative;z-index:1;color:#352713;font-weight:500}.quick-note-input::placeholder{color:rgba(53,39,19,.5)}
    .quick-note-actions{position:relative;z-index:1;border-top:1px solid rgba(130,100,55,.12);background:rgba(255,248,205,.4)}
    [data-theme="dark"] .quick-note-wrap{border-color:rgba(212,175,90,.24);background:radial-gradient(circle at 18px 18px,rgba(255,255,255,.08) 0 1px,transparent 1.5px),linear-gradient(135deg,#2a2000,#2a1a08);box-shadow:0 14px 30px rgba(0,0,0,.38),0 2px 8px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.08)}
    [data-theme="dark"] .quick-note-input{color:var(--note-text)}[data-theme="dark"] .quick-note-input::placeholder{color:rgba(232,237,245,.42)}[data-theme="dark"] .quick-note-actions{background:rgba(11,16,32,.34);border-top-color:rgba(255,255,255,.06)}
    .category-card{overflow:hidden;background:radial-gradient(circle at 18px 18px,rgba(255,255,255,.3) 0 1px,transparent 1.5px),linear-gradient(145deg,#fffdf8,#f4efe6);background-size:14px 14px,auto;border-color:rgba(160,130,80,.14);box-shadow:0 6px 16px rgba(121,91,48,.1),0 1px 2px rgba(0,0,0,.05),inset 0 1px 0 rgba(255,255,255,.7)}
    .category-card:before{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(120,90,45,.025));mix-blend-mode:multiply}
    .category-card-top,.category-name,.category-count{position:relative;z-index:1}.category-icon-wrap{width:48px;height:48px;padding:8px;border-radius:16px;background:linear-gradient(145deg,rgba(255,255,255,.72),rgba(239,229,211,.72));border:1px solid rgba(160,130,80,.14);box-shadow:inset 0 1px 0 rgba(255,255,255,.72),0 5px 12px rgba(121,91,48,.1)}
    .category-icon-wrap img,.cat-icon-img{width:30px!important;height:30px!important;object-fit:contain;filter:drop-shadow(0 3px 4px rgba(90,65,35,.16));transform:translateZ(0)}.chip-icon-img{width:16px;height:16px;object-fit:contain;vertical-align:-3px;filter:drop-shadow(0 1px 2px rgba(90,65,35,.12))}
    .stage5b-icon-fallback{width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;border-radius:10px;background:rgba(200,169,110,.16);color:var(--color-primary-dark);font-weight:800;font-size:.8rem;letter-spacing:.02em}
    [data-theme="dark"] .category-card{background:radial-gradient(circle at 18px 18px,rgba(255,255,255,.05) 0 1px,transparent 1.5px),linear-gradient(145deg,#151e30,#101827);border-color:rgba(212,175,90,.16);box-shadow:0 12px 28px rgba(0,0,0,.34),0 1px 2px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.06)}
    [data-theme="dark"] .category-icon-wrap{background:linear-gradient(145deg,rgba(255,255,255,.08),rgba(212,175,90,.08));border-color:rgba(212,175,90,.18);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 6px 16px rgba(0,0,0,.32)}[data-theme="dark"] .category-icon-wrap img,[data-theme="dark"] .cat-icon-img{filter:drop-shadow(0 4px 8px rgba(0,0,0,.42))}
  </style>
</head>
<body>

  <!-- Update notice -->
  <div id="update-notice" class="update-notice" hidden>
    <span data-i18n="update_available">A new version is available.</span>
    <button id="update-btn" data-i18n="update_refresh" style="font-weight:700;text-decoration:underline;background:none;color:inherit;border:none;cursor:pointer">
      Refresh
    </button>
  </div>

  <!-- App Header -->
  <header class="app-header">
    <div class="app-title">
      <span class="app-title-icon">📌</span>
      Note Clip
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="es">ES</button>
    </div>
  </header>

  <!-- Main content -->
  <main class="app-main" id="app-main">

    <!-- Dashboard Pane -->
    <section id="pane-dashboard" class="tab-pane active">
      <!-- Rendered by dashboard.js -->
    </section>

    <!-- Notes Pane -->
    <section id="pane-notes" class="tab-pane">
      <!-- Rendered by notes.js -->
    </section>

    <!-- Lists Pane -->
    <section id="pane-lists" class="tab-pane">
      <!-- Rendered by lists.js -->
    </section>

    <!-- Shared Pane -->
    <section id="pane-shared" class="tab-pane">
      <!-- Rendered by shared.js -->
    </section>

    <!-- Communication Pane -->
    <section id="pane-communication" class="tab-pane">
      <!-- Rendered by communication.js -->
    </section>

    <!-- Settings Pane -->
    <section id="pane-settings" class="tab-pane">
      <!-- Rendered by settings.js -->
    </section>

  </main>

  <!-- FAB -->
  <button class="fab" id="fab" aria-label="Add new">
    +
  </button>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
    <button class="nav-tab active" data-tab="dashboard" aria-label="Dashboard">
      <span class="nav-icon"><img src="./icons/ic_nav_dashboard.png" class="nav-icon-img" alt=""></span>
      <span data-i18n="tab_dashboard">Dashboard</span>
    </button>
    <button class="nav-tab" data-tab="notes" aria-label="Notes">
      <span class="nav-icon"><img src="./icons/ic_nav_notes.png" class="nav-icon-img" alt=""></span>
      <span data-i18n="tab_notes">Notes</span>
    </button>
    <button class="nav-tab" data-tab="lists" aria-label="Lists">
      <span class="nav-icon"><img src="./icons/ic_nav_lists.png" class="nav-icon-img" alt=""></span>
      <span data-i18n="tab_lists">Lists</span>
    </button>
    <button class="nav-tab" data-tab="shared" aria-label="Shared">
      <span class="nav-icon"><img src="./icons/ic_nav_shared.png" class="nav-icon-img" alt=""></span>
      <span data-i18n="tab_shared">Shared</span>
    </button>
    <button class="nav-tab" data-tab="communication" aria-label="Communication">
      <span class="nav-icon"><img src="./icons/ic_nav_communication.png" class="nav-icon-img" alt=""></span>
      <span data-i18n="tab_communication">Comms</span>
    </button>
    <button class="nav-tab" data-tab="settings" aria-label="Settings">
      <span class="nav-icon"><img src="./icons/ic_nav_settings.png" class="nav-icon-img" alt=""></span>
      <span data-i18n="tab_settings">Settings</span>
    </button>
  </nav>

  <!-- Toast -->
  <div id="app-toast" class="toast"></div>

  <!-- Scripts — load order matters -->
  <script src="./js/i18n.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/dashboard.js"></script>
  <script src="./js/notes.js"></script>
  <script src="./js/lists.js"></script>
  <script src="./js/shared.js"></script>
  <script src="./js/communication.js"></script>
  <script src="./js/settings.js"></script>
  <script src="./js/firebase/firebase-config.js"></script>
  <script src="./app.js"></script>
  <script>
    (function(){
      const icons=[
        {id:'morning',start:5,end:12,file:'ic_extra_lighthouse',fallback:'AM'},
        {id:'afternoon',start:12,end:17,file:'ic_extra_compass',fallback:'PM'},
        {id:'evening',start:17,end:21,file:'ic_extra_tree',fallback:'EV'},
        {id:'night',start:21,end:29,file:'ic_extra_stars',fallback:'NT'}
      ];
      function config(){const h=new Date().getHours();const n=h<5?h+24:h;return icons.find(i=>n>=i.start&&n<i.end)||icons[3];}
      function applyGreeting(){
        const g=document.querySelector('#pane-dashboard .greeting-text');
        if(!g||g.dataset.stage5b==='1')return;
        const img=g.querySelector('img');
        if(!img)return;
        const c=config();
        img.src='./icons/'+c.file+'.png';
        img.alt=c.id+' greeting';
        img.classList.add('stage5b-greeting-icon');
        img.onerror=function(){const s=document.createElement('span');s.className='stage5b-greeting-icon stage5b-icon-fallback';s.textContent=c.fallback;this.replaceWith(s);};
        g.dataset.stage5b='1';
      }
      const catIcons={work:'ic_cat_work',medical:'ic_cat_medical',personal:'ic_cat_personal',home:'ic_cat_home',documents:'ic_cat_documents','follow-up':'ic_cat_followup',orders:'ic_cat_orders',ideas:'ic_cat_ideas'};
      function applyCategoryIcons(){
        document.querySelectorAll('#pane-notes .category-card').forEach(card=>{
          if(card.dataset.stage5bCat==='1')return;
          const name=(card.querySelector('.category-name')?.textContent||'').trim().toLowerCase();
          const file=catIcons[name];
          const wrap=card.querySelector('.category-icon-wrap');
          if(!file||!wrap)return;
          const fallback=(name.slice(0,2)||'NC').toUpperCase();
          wrap.innerHTML='<img src="./icons/'+file+'.png" class="cat-icon-img" alt="">';
          const img=wrap.querySelector('img');
          img.onerror=function(){wrap.innerHTML='<span class="stage5b-icon-fallback">'+fallback+'</span>';};
          card.dataset.stage5bCat='1';
        });
      }
      function apply(){applyGreeting();applyCategoryIcons();}
      window.addEventListener('DOMContentLoaded',function(){apply();new MutationObserver(apply).observe(document.getElementById('app-main'),{childList:true,subtree:true});});
    })();
  </script>

</body>
</html>
