name: Disable accidental pinch zoom once

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/disable-pinch-zoom-once.yml'

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lock viewport and refresh PWA cache
        run: |
          python3 - <<'PY'
          from pathlib import Path

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')
          old = '<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">'
          new = '<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">'
          if old not in html and new not in html:
              raise SystemExit('Expected viewport tag not found')
          index.write_text(html.replace(old, new, 1), encoding='utf-8')

          sw = Path('sw.js')
          text = sw.read_text(encoding='utf-8')
          old_cache = "const CACHE_VERSION = 'note-clip-v117-grocery-ux';"
          new_cache = "const CACHE_VERSION = 'note-clip-v118-no-pinch-zoom';"
          if old_cache not in text and new_cache not in text:
              raise SystemExit('Expected cache version not found')
          sw.write_text(text.replace(old_cache, new_cache, 1), encoding='utf-8')
          PY

          rm .github/workflows/disable-pinch-zoom-once.yml

      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sw.js .github/workflows/disable-pinch-zoom-once.yml
          git commit -m "fix: disable accidental pinch zoom"
          git push
